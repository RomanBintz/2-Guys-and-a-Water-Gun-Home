═══════════════════════════════════════════════════════════ */
:root{
  --yellow:#FEF700;        /* logo splash yellow */
  --blue:#0067FE;          /* logo hydrant blue  */
  --blue-dark:#0047B3;
  --ink:#0B2B5B;           /* deep-water navy text */
  --mist:#EFF5FF;          /* light blue wash background */
  --white:#FFFFFF;
  --line:#D8E4F8;
  --green:#0E9F5B;
  --red:#D93025;
  --radius:18px;
  --font-display:'Anton',Impact,sans-serif;
  --font-body:'Inter',-apple-system,'Segoe UI',sans-serif;
  --topbar-h:64px;
  --bnav-h:74px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:17px}
body{
  font-family:var(--font-body);color:var(--ink);background:var(--white);
  line-height:1.55;padding-top:var(--topbar-h);
  padding-bottom:calc(var(--bnav-h) + env(safe-area-inset-bottom));
}
h1,h2,h3{line-height:1.15}
.display{font-family:var(--font-display);font-weight:400;text-transform:uppercase;letter-spacing:.01em}
a{color:var(--blue)}
img{max-width:100%;display:block}
button{font-family:var(--font-body)}

/* ── Top bar ── */
#topbar{
  position:fixed;top:0;left:0;right:0;height:var(--topbar-h);z-index:900;
  background:var(--white);border-bottom:3px solid var(--yellow);
  display:flex;align-items:center;gap:10px;padding:0 14px;
}
#topbar .brand{display:flex;align-items:center;gap:10px;cursor:pointer;min-width:0}
#topbar .brand-name{font-family:var(--font-display);font-size:1.05rem;color:var(--blue);text-transform:uppercase;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#topbar .call-btn{
  margin-left:auto;background:var(--blue);color:#fff;border:none;border-radius:999px;
  font-weight:800;font-size:.95rem;padding:11px 18px;cursor:pointer;text-decoration:none;
  display:flex;align-items:center;gap:7px;flex-shrink:0;
}
#topbar .call-btn:active{background:var(--blue-dark)}

/* drop logo mark (SVG inline) */
.dropmark{width:36px;height:44px;flex-shrink:0}

/* ── Layout helpers ── */
#main{max-width:760px;margin:0 auto;min-height:60vh}
.pad{padding:18px 16px}
.card{background:var(--white);border:2px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.card.mist{background:var(--mist);border-color:transparent}
.section-title{font-family:var(--font-display);font-size:1.7rem;color:var(--ink);text-transform:uppercase;margin:6px 0 14px}
.eyebrow{display:inline-block;background:var(--yellow);color:var(--ink);font-weight:800;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;padding:5px 12px;border-radius:6px;margin-bottom:10px}
.muted{color:#4A5F85;font-size:.95rem}
.big-btn{
  display:block;width:100%;background:var(--blue);color:#fff;border:none;border-radius:14px;
  font-size:1.15rem;font-weight:800;padding:17px;cursor:pointer;text-align:center;text-decoration:none;
}
.big-btn:active{background:var(--blue-dark)}
.big-btn.yellow{background:var(--yellow);color:var(--ink)}
.big-btn.ghost{background:var(--white);color:var(--blue);border:2.5px solid var(--blue)}
.pill{display:inline-block;padding:4px 12px;border-radius:999px;font-size:.8rem;font-weight:800;text-transform:uppercase;letter-spacing:.03em}
.pill.sent{background:var(--yellow);color:var(--ink)}
.pill.approved,.pill.paid{background:#D5F5E5;color:var(--green)}
.pill.declined,.pill.overdue{background:#FDE1DF;color:var(--red)}
.pill.unpaid,.pill.draft{background:var(--mist);color:var(--blue)}

/* ── Hero ── */
.hero{position:relative;background:var(--blue);color:#fff;overflow:hidden;padding:44px 20px 90px;text-align:center}
.hero .display{font-size:clamp(2.1rem,8vw,3.4rem);color:#fff}
.hero .display .yl{color:var(--yellow)}
.hero p{margin:14px auto 22px;max-width:420px;font-size:1.05rem;color:#DCE9FF}
.hero .hero-cta{display:inline-block;background:var(--yellow);color:var(--ink);font-weight:800;font-size:1.15rem;padding:16px 34px;border-radius:999px;text-decoration:none;border:none;cursor:pointer}
.hero::after{ /* clean diagonal wipe */
  content:'';position:absolute;left:-5%;right:-5%;bottom:-40px;height:90px;
  background:var(--white);transform:rotate(-3deg);
}
.hero .drops{display:flex;justify-content:center;margin-bottom:10px}

/* ── Services strip ── */
.svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.svc{background:var(--mist);border-radius:var(--radius);padding:16px 14px;text-align:center}
.svc .em{font-size:1.9rem}
.svc .nm{font-weight:800;margin-top:6px;font-size:.95rem}

/* ── Punch card ── */

.punch{width:58px;height:72px;position:relative}
.punch svg{width:100%;height:100%}
.punch .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding-top:14px;font-weight:800;color:var(--ink);font-size:1.05rem}
.punch.filled .num{color:var(--ink)}
.reward-ready{background:var(--yellow);border-radius:var(--radius);padding:18px;text-align:center;font-weight:800;font-size:1.1rem}

/* ── Forms ── */
label{display:block;font-weight:700;font-size:.92rem;margin:14px 0 6px}
input[type=text],input[type=tel],input[type=email],textarea,select{
  width:100%;padding:14px;border:2px solid var(--line);border-radius:12px;
  font-size:1.05rem;font-family:var(--font-body);color:var(--ink);background:#fff;
}
input:focus,textarea:focus,select:focus{outline:3px solid var(--yellow);border-color:var(--blue)}
textarea{min-height:110px;resize:vertical}
.check-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.check-item{display:flex;align-items:center;gap:9px;background:var(--mist);border-radius:10px;padding:12px;font-weight:600;font-size:.95rem;cursor:pointer}
.check-item input{width:22px;height:22px;flex-shrink:0}
.radio-row{display:flex;gap:10px}
.radio-card{flex:1;text-align:center;border:2.5px solid var(--line);border-radius:12px;padding:13px;font-weight:800;cursor:pointer}
.radio-card.on{border-color:var(--blue);background:var(--mist);color:var(--blue)}

/* ── Estimates / jobs rows ── */
.doc-row{border:2px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.doc-row .top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:6px}
.doc-row .amt{font-weight:800;font-size:1.25rem}
.doc-actions{display:flex;gap:10px;margin-top:12px}
.doc-actions button{flex:1;padding:13px;border-radius:11px;font-weight:800;font-size:1rem;border:none;cursor:pointer}
.btn-approve{background:var(--green);color:#fff}
.btn-decline{background:#fff;color:var(--red);border:2.5px solid var(--red) !important}
.item-line{display:flex;justify-content:space-between;font-size:.95rem;padding:3px 0;color:#33507F}

/* ── Messages ── */
.msg-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.bubble{max-width:82%;padding:11px 15px;border-radius:16px;font-size:1rem}
.bubble.client{align-self:flex-end;background:var(--blue);color:#fff;border-bottom-right-radius:4px}
.bubble.business{align-self:flex-start;background:var(--mist);border-bottom-left-radius:4px}
.bubble .t{display:block;font-size:.72rem;opacity:.7;margin-top:3px}
.msg-input-row{display:flex;gap:8px}
.msg-input-row input{flex:1}
.msg-input-row button{background:var(--blue);color:#fff;border:none;border-radius:12px;padding:0 20px;font-weight:800;cursor:pointer}

/* ── FAQ ── */
.faq-q{border:2px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden}
.faq-q button{width:100%;background:#fff;border:none;text-align:left;padding:16px;font-weight:800;font-size:1rem;color:var(--ink);cursor:pointer;display:flex;justify-content:space-between;gap:10px}
.faq-q .a{display:none;padding:0 16px 16px;color:#33507F}
.faq-q.open .a{display:block}
.faq-q.open button{background:var(--mist)}

/* ── Map ── */
#mapbox{height:62vh;border-radius:var(--radius);border:2px solid var(--line)}
.leaflet-container{font-family:var(--font-body)}

/* ── Gallery ── */
.gal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.gal-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:12px}
.gal-cap{font-size:.85rem;color:#4A5F85;margin-top:4px}

/* ── Bottom nav ── */
#bnav{
  position:fixed;bottom:0;left:0;right:0;z-index:900;height:calc(var(--bnav-h) + env(safe-area-inset-bottom));
  background:var(--white);border-top:2px solid var(--line);
  display:flex;align-items:flex-start;padding:8px 4px env(safe-area-inset-bottom);
}
#bnav .tab{
  flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;
  font-size:.72rem;font-weight:700;color:#6B7FA5;cursor:pointer;padding-top:6px;touch-action:manipulation;

#bnav .tab .ic{font-size:1.45rem;line-height:1}
#bnav .tab.on{color:var(--blue)}
#bnav .quote-tab{flex:1.2;position:relative}
#bnav .quote-drop{
  position:absolute;top:-26px;left:50%;transform:translateX(-50%);
  width:62px;height:62px;background:var(--yellow);border:4px solid var(--white);
  border-radius:50% 50% 50% 0;transform:translateX(-50%) rotate(-45deg);
  box-shadow:0 3px 10px rgba(11,43,91,.25);display:flex;align-items:center;justify-content:center;

#bnav .quote-drop span{transform:rotate(45deg);font-size:1.5rem}
#bnav .quote-tab .lbl{margin-top:40px;font-size:.72rem;font-weight:800;color:var(--ink)}

/* ── More sheet ── */
#sheet-bg{position:fixed;inset:0;background:rgba(11,43,91,.45);z-index:950;display:none}
#sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:960;background:#fff;
  border-radius:22px 22px 0 0;padding:18px 18px calc(20px + env(safe-area-inset-bottom));
  transform:translateY(105%);transition:transform .25s ease;

#sheet.open{transform:translateY(0)}
#sheet .sheet-link{
  display:flex;align-items:center;gap:14px;width:100%;background:none;border:none;
  padding:15px 6px;font-size:1.08rem;font-weight:700;color:var(--ink);cursor:pointer;
  border-bottom:1.5px solid var(--mist);text-align:left;touch-action:manipulation;
}
#sheet .sheet-link .ic{font-size:1.3rem;width:30px;text-align:center}

/* ── Toast ── */
#toast{
  position:fixed;left:50%;transform:translateX(-50%);bottom:calc(var(--bnav-h) + 20px);
  background:var(--ink);color:#fff;padding:13px 22px;border-radius:999px;font-weight:700;
  z-index:1200;display:none;max-width:88vw;text-align:center;

/* ── Desktop ── */
@media(min-width:820px){
  body{padding-bottom:30px}
  #bnav{display:none}
  #topbar{height:76px;padding:0 28px}
  :root{--topbar-h:76px}
  #topnav-links{display:flex !important;gap:4px;margin-left:18px}
  #topnav-links button{background:none;border:none;font-weight:700;font-size:.98rem;color:var(--ink);padding:10px 13px;border-radius:9px;cursor:pointer}
  #topnav-links button:hover{background:var(--mist);color:var(--blue)}
  .svc-grid{grid-template-columns:repeat(3,1fr)}
  .gal-grid{grid-template-columns:repeat(3,1fr)}
}
#topnav-links{display:none}
@media (prefers-reduced-motion: reduce){
  *{transition:none !important;animation:none !important}
}
</style>

function estTotal(e){

  return S.invoice_items.filter(function(it){return it.invoice_id===inv.id;})
    .reduce(function(s,it){return s+(Number(it.rate)||0)*(Number(it.qty)||1);},0);

  return items.map(function(it){

async function respondEstimate(id,action){

    var r=await supa.rpc('portal_respond_estimate',{p_id:id,p_action:action});

    var e=S.estimates.find(function(x){return x.id===id;});
    if(e)e.status=action;
    showToast(action==='approved'?'✅ Approved! We\'ll reach out to schedule.':'Estimate declined');

      await emailjs.send(EMAILJS_SERVICE,EMAILJS_TEMPLATE,{
        to_email:BUSINESS.email,

        message:'Estimate ID: '+id+'\nClient: '+(S.client?(S.client.contact+' / '+S.client.phone):S.user.email)+'\nAction: '+action,
        name:BUSINESS.name,email:BUSINESS.email,time:new Date().toLocaleString()

}

      +'</div>'
      +'<p class="muted" id="login-err" style="color:var(--red);display:none;margin-top:10px"></p>'
    +'</div>'
    +'<div class="card mist"><p class="muted"><b>Tip:</b> use the same email we send your invoices to — that\'s how we match you to your estimates and rewards. Not sure which one? Call us.</p></div>'
  +'</div>';
}
var _loginEmail='';
function backToStep1(){$('login-step1').style.display='block';$('login-step2').style.display='none';}
async function sendCode(){
  var email=($('login-email').value||'').trim().toLowerCase();
  var err=$('login-err');err.style.display='none';
  if(!email||email.indexOf('@')<0){err.textContent='Enter a valid email.';err.style.display='block';return;}
  var btn=$('login-send');btn.disabled=true;btn.textContent='Sending…';
  var r=await supa.auth.signInWithOtp({email:email,options:{shouldCreateUser:true}});
  btn.disabled=false;btn.textContent='Email Me a Code';
  if(r.error){err.textContent=r.error.message||'Couldn\'t send the code. Try again in a minute.';err.style.display='block';return;}
  _loginEmail=email;
  $('login-step1').style.display='none';$('login-step2').style.display='block';
  $('login-code').focus();
  showToast('Code sent to '+email);
}
async function verifyCode(){
  var code=($('login-code').value||'').trim();
  var err=$('login-err');err.style.display='none';
  code=code.replace(/[^0-9]/g,'');
  if(code.length<6||code.length>10){err.textContent='Enter the code exactly as it appears in your email.';err.style.display='block';return;}
  var btn=$('login-verify');btn.disabled=true;btn.textContent='Checking…';
  var r=await supa.auth.verifyOtp({email:_loginEmail,token:code,type:'email'});
  btn.disabled=false;btn.textContent='Sign In';
  if(r.error){err.textContent='That code didn\'t work — double-check it or request a new one.';err.style.display='block';return;}
  S.user=r.data.user;S.loaded=false;
  showToast('Welcome!');
  await loadClientData();
  showView('account');
}
async function doSignOut(){
  await supa.auth.signOut();
  S.user=null;S.client=null;S.loaded=false;
  S.invoices=[];S.invoice_items=[];S.estimates=[];S.estimate_items=[];S.recurring=[];S.redemptions=[];S.msgs=[];
  showToast('Signed out');
  showView('home');
}

/* ─── DATA LOAD (after sign in; RLS limits everything to this client) ─── */
async function loadClientData(){
  if(!S.user)return;
  try{
    // Match the client record by the exact sign-in email (case-insensitive).
    // Never "first row" — the admin account can see all clients, and a
    // blind first-row grab would impersonate a random customer.
    var cr=await supa.from('clients').select('*').ilike('email',S.user.email);
    S.client=(cr.data&&cr.data[0])||null;
    if(S.client){
      var res1=await Promise.all([
        supa.from('invoices').select('*').eq('client_id',S.client.id),
        supa.from('estimates').select('*').eq('client_id',S.client.id),
        supa.from('recurring').select('*').eq('client_id',S.client.id),
        supa.from('reward_redemptions').select('*').eq('client_id',S.client.id)
      ]);
      S.invoices=res1[0].data||[];
      S.estimates=res1[1].data||[];
      S.recurring=res1[2].data||[];
      S.redemptions=res1[3].data||[];
      var invIds=S.invoices.map(function(i){return i.id;});
      var estIds=S.estimates.map(function(e){return e.id;});
      var res2=await Promise.all([
        invIds.length?supa.from('invoice_items').select('*').in('invoice_id',invIds):Promise.resolve({data:[]}),
        estIds.length?supa.from('estimate_items').select('*').in('invoice_id',estIds):Promise.resolve({data:[]})
      ]);
      S.invoice_items=res2[0].data||[];
      S.estimate_items=res2[1].data||[];
    } else {
      S.invoices=[];S.invoice_items=[];S.estimates=[];S.estimate_items=[];S.recurring=[];S.redemptions=[];
    }
    var mr=await supa.from('messages').select('*').ilike('client_email',S.user.email).order('created_at');
    S.msgs=mr.data||[];
  }catch(e){console.error('load error',e);}
  S.loaded=true;
}

/* ─── MESSAGES ─── */
var _msgPoll=null;
function msgListHTML(){
  return S.msgs.length
    ?S.msgs.map(function(m){
      return '<div class="bubble '+(m.sender==='client'?'client':'business')+'">'+escH(m.body)
        +'<span class="t">'+new Date(m.created_at).toLocaleString()+'</span></div>';
    }).join('')
    :'<div class="card mist"><p>No messages yet — say hi! We usually answer within a few hours during the day.</p></div>';
}
async function fetchMsgs(){
  if(!S.user)return false;
  try{
    var r=await supa.from('messages').select('*').ilike('client_email',S.user.email).order('created_at');
    var fresh=r.data||[];
    var changed=fresh.length!==S.msgs.length;
    S.msgs=fresh;
    return changed;
  }catch(e){return false;}
}
VIEWS.messages = function(el){
  if(!S.user){
    el.innerHTML='<div class="pad"><h2 class="section-title">💬 Message Us</h2>'
      +'<div class="card mist" style="text-align:center"><p style="font-weight:700;margin-bottom:12px">Sign in to send us a message.</p>'
      +'<button class="big-btn" onclick="showView(\'account\')">Sign In</button></div>'
      +'<p class="muted" style="text-align:center">Or just call/text: <a href="tel:'+BUSINESS.phone+'">'+escH(BUSINESS.phoneDisplay)+'</a></p></div>';
    return;
  }
  el.innerHTML='<div class="pad">'
    +'<h2 class="section-title">💬 Messages</h2>'
    +'<div class="msg-list" id="msg-list">'+msgListHTML()+'</div>'
    +'<div class="msg-input-row"><input type="text" id="msg-body" placeholder="Type a message…" onkeydown="if(event.key===\'Enter\')sendMsg()"><button onclick="sendMsg()">Send</button></div>'
  +'</div>';
  window.scrollTo(0,document.body.scrollHeight);
  // fetch fresh now, then poll every 8s while this page is open
  fetchMsgs().then(function(ch){if(ch&&_view==='messages')refreshMsgList();});
  _msgPoll=setInterval(function(){
    if(_view!=='messages'){clearInterval(_msgPoll);_msgPoll=null;return;}
    fetchMsgs().then(function(ch){if(ch&&_view==='messages')refreshMsgList();});
  },8000);
};
function refreshMsgList(){
  var list=$('msg-list');
  if(!list)return;
  list.innerHTML=msgListHTML();
  window.scrollTo(0,document.body.scrollHeight);
}
async function sendMsg(){
  var body=($('msg-body').value||'').trim();
  if(!body)return;
  $('msg-body').value='';
  var row={client_email:S.user.email.toLowerCase(),sender:'client',body:body};
  try{
    var r=await supa.from('messages').insert(row);
    if(r.error)throw r.error;
    S.msgs.push(Object.assign({created_at:new Date().toISOString()},row));
    refreshMsgList();
    try{
      await emailjs.send(EMAILJS_SERVICE,EMAILJS_TEMPLATE,{
        to_email:BUSINESS.email,
        subject:'💬 New website message from '+(S.client?S.client.contact:S.user.email),
        message:body+'\n\nFrom: '+S.user.email+(S.client?' / '+S.client.phone:''),
        name:BUSINESS.name,email:S.user.email,time:new Date().toLocaleString()
      });
    }catch(e2){}
  }catch(e){console.error(e);showToast('Message didn\'t send — try again');}
}

/* ─── INIT ─── */
(function init(){
  $('call-link').href='tel:'+BUSINESS.phone;
  $('sheet-call').href='tel:'+BUSINESS.phone;
  supa.auth.getSession().then(function(r){
    if(r.data&&r.data.session){S.user=r.data.session.user;loadClientData().then(function(){if(_view==='home')showView('home');});}
  });
  showView('home');
})();
</script>
</body>
